spring.application.name=BrazaGoat

# Banco de dados via variáveis de ambiente
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/brazagoat-teste-api}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Flyway gerencia o schema agora — ddl-auto deve ser 'validate' ou 'none' em produção
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Swagger UI disponível em /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
